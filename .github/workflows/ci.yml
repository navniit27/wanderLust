name: WanderLust CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint-and-validate:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Check Syntax Errors
        run: |
          for file in app.js middleware.js schema.js cloudConfig.js \
            controllers/listings.js controllers/reviews.js controllers/users.js \
            routes/listings.js routes/review.js routes/user.js \
            models/listing.js models/review.js models/user.js \
            utils/expressError.js utils/wrapAsync.js; do
            echo "Checking $file ..."
            node --check "$file"
          done

      - name: Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t wanderlust-app:test .

      - name: Verify Docker Image
        run: docker image inspect wanderlust-app:test

  deploy:
    name: Deploy to Render
    needs: [lint-and-validate, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          if [ "$response" != "200" ] && [ "$response" != "201" ] && [ "$response" != "202" ]; then
            echo "❌ Deploy failed with status: $response"
            exit 1
          fi
          echo "✅ Deploy triggered successfully (HTTP $response)"