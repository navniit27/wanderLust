services:
  app:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongo:27017/wanderlust
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
